<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#1E2D5E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BFDBFE;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#93C5FD;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#93C5FD" stroke-width="0.5" fill="none">
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
  </g>

  <!-- Server/Cube - isometric style -->
  <!-- Top face -->
  <polygon points="128,52 196,88 128,124 60,88" fill="#2B4EA8" stroke="#3B63C0" stroke-width="1"/>
  <!-- Left face -->
  <polygon points="60,88 128,124 128,180 60,144" fill="#1E3A8A" stroke="#2B4EA8" stroke-width="1"/>
  <!-- Right face -->
  <polygon points="196,88 128,124 128,180 196,144" fill="#243F8F" stroke="#2B4EA8" stroke-width="1"/>

  <!-- AI Circuit lines on cube faces -->
  <!-- Top face circuits -->
  <g stroke="#93C5FD" stroke-width="1.5" fill="none" opacity="0.8">
    <polyline points="96,76 128,94 160,76"/>
    <polyline points="112,68 112,82 128,90"/>
    <polyline points="144,68 144,82 128,90"/>
  </g>

  <!-- Left face circuits -->
  <g stroke="#93C5FD" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="76,104 94,114 94,138 76,128"/>
    <line x1="94" y1="126" x2="110" y2="136"/>
  </g>

  <!-- Right face circuits -->
  <g stroke="#93C5FD" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="180,104 162,114 162,138 180,128"/>
    <line x1="162" y1="126" x2="146" y2="136"/>
  </g>

  <!-- Circuit nodes (dots) on cube -->
  <g fill="#93C5FD">
    <circle cx="128" cy="94" r="3"/>
    <circle cx="112" cy="68" r="2"/>
    <circle cx="144" cy="68" r="2"/>
    <circle cx="96" cy="76" r="2"/>
    <circle cx="160" cy="76" r="2"/>
    <circle cx="94" cy="114" r="2"/>
    <circle cx="76" cy="104" r="2"/>
    <circle cx="162" cy="114" r="2"/>
    <circle cx="180" cy="104" r="2"/>
  </g>

  <!-- Neural network below cube -->
  <!-- Layer 1 nodes -->
  <g fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.5">
    <line x1="80" y1="180" x2="104" y2="200"/>
    <line x1="128" y1="180" x2="104" y2="200"/>
    <line x1="128" y1="180" x2="152" y2="200"/>
    <line x1="176" y1="180" x2="152" y2="200"/>
    <line x1="80" y1="180" x2="152" y2="200"/>
    <line x1="176" y1="180" x2="104" y2="200"/>
  </g>

  <!-- Layer 1 -->
  <circle cx="80" cy="180" r="4" fill="#93C5FD" opacity="0.7"/>
  <circle cx="128" cy="180" r="4" fill="#93C5FD" opacity="0.9"/>
  <circle cx="176" cy="180" r="4" fill="#93C5FD" opacity="0.7"/>

  <!-- Layer 2 -->
  <circle cx="104" cy="200" r="3.5" fill="#60A5FA" opacity="0.6"/>
  <circle cx="152" cy="200" r="3.5" fill="#60A5FA" opacity="0.6"/>

  <!-- Glow effect around main node -->
  <circle cx="128" cy="94" r="8" fill="#93C5FD" opacity="0.15"/>
  <circle cx="128" cy="94" r="14" fill="#93C5FD" opacity="0.05"/>
</svg>
